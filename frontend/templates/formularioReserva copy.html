<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modificar Reserva</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    {% extends "layout.html" %}
</head>
<body>
    {% block body %}
    <div class="form-container">
        <h1>Modificar Reserva</h1>

        <form method="POST">
            
            <div class="form-group">
                <label for="nombre">Nombre del cliente:</label>
                <input type="text" id="nombre" name="nombre" value="{{ reserva.nombre }}" required>
            </div>

            <div class="form-group">
                <label for="fecha">Fecha y Hora:</label>
                <input type="datetime-local" id="fecha" name="fecha" value="{{ reserva.fecha }}" required>
            </div>

            <div class="form-group">
                <label for="mesa">Número de Mesa:</label>
                <input type="number" id="mesa" name="mesa" value="{{ reserva.mesa }}" required>
            </div>

            <div class="form-group">
                <label for="cantidad_personas">Cantidad de personas:</label>
                <input type="number" id="cantidad_personas" name="cantidad_personas" value="{{ reserva.cantidad_personas }}" required>
            </div>

            <br>
            <button type="submit" class="btn-submit">Guardar Cambios</button>
            <a href="/" class="btn-cancel">Cancelar</a>

        </form>
</div>
{% endblock %}
</body>
</html>
