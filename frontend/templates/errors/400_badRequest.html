{% extends "layout.html" %}

{% block content %}
<div class="form-container" style="text-align: center; max-width: 600px; margin: 50px auto; padding: 40px;">
    
    <div class="error-code" style="font-size: 96px; font-weight: bold; color: #4e555b; line-height: 1; margin-bottom: 10px;">
        400
    </div>

    <h1 style="font-size: 28px; margin-bottom: 15px; color: #333;">Solicitud Incorrecta</h1>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 25px;">

    <p style="font-size: 16px; color: #495057; line-height: 1.6; margin-bottom: 30px;">
        El sistema no pudo procesar los datos enviados. Esto ocurre generalmente si el formulario contiene campos con formatos inválidos o información incompleta.
    </p>

    <div style="margin-top: 20px;">
        <a href="{{ url_for('reservas.reservasList') }}" class="btn-back-badrequest" 
           style="display: inline-block; background-color: #6c757d; color: white; padding: 12px 24px; border-radius: 5px; text-decoration: none; font-weight: bold; transition: background-color 0.2s;">
            ↩️ Volver al inicio
        </a>
    </div>

</div>

<style>
    .btn-back-badrequest:hover {
        background-color: #5a6268 !important;
    }
</style>
{% endblock %}
