{% extends "layout.html" %}

{% block content %}
<div class="form-container" style="text-align: center; max-width: 600px; margin: 50px auto; padding: 40px;">
    
    <div class="error-code" style="font-size: 96px; font-weight: bold; color: #dc3545; line-height: 1; margin-bottom: 10px;">
        403
    </div>

    <h1 style="font-size: 28px; margin-bottom: 15px; color: #333;">Acceso Restringido</h1>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 25px;">

    <p style="font-size: 16px; color: #495057; line-height: 1.6; margin-bottom: 30px;">
        Lo sentimos, no tenés los permisos necesarios para ver esta sección o realizar esta acción en el sistema de reservas. 
    </p>

    <div style="margin-top: 20px;">
        <a href="{{ url_for('reservas.reservasList') }}" class="btn-back-forbidden" 
           style="display: inline-block; background-color: #ffc107; color: #212529; padding: 12px 24px; border-radius: 5px; text-decoration: none; font-weight: bold; transition: background-color 0.2s;">
            🔐 Volver a la zona segura
        </a>
    </div>

</div>

{% endblock %}
