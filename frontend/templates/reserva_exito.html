<div class="card">
        <div class="tilde"">✓</div>
        <h1>¡Reserva Confirmada!</h1>
        <p>Tu reserva en <strong>Nombre restaurante</strong> está lista.</p>
        
        <div class="datos-lista">
            <p><strong>ID de Reserva:</strong> <span class="id-reserva">{{ reserva.id }}</span></p>
            <p><strong>Nombre:</strong> {{ reserva.nombre }}</p>
            <p><strong>Fecha:</strong> {{ reserva.fecha }}</p>
            <p><strong>Hora:</strong> {{ reserva.hora }} hs</p>
            <p><strong>Personas:</strong> {{ reserva.personas }} personas</p>
        </div>

        <p style="font-size: 13px; color: #7f8c8d;">Presentá este código QR al llegar al restaurante:</p>
        
        <div class="qr-container">
            <img src="data:image/png;base64,{{ qr_code }}" alt="Código QR de la reserva">
        </div>
    </div>
