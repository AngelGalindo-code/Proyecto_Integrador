{% extends "layout.html" %}

{% block content %}
<div class="form-container">
    <h1>Nueva Reserva</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'error' }}">
                         {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

    <form id="form-crear-reserva" method="POST" action="{{ url_for('reservas.crearReserva') }}">
        
        <div class="form-group dato_ingreso">
            <label for="nombre">Nombre del cliente:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: Franco Armani" value="{{ valores['nombre'] if valores else '' }}" required>
        </div>

        <div class="form-group dato_ingreso">
            <label for="fecha">Fecha del Turno:</label>
            <input type="date" id="fecha" name="fecha" value="{{ valores['fecha'] if valores else '' }}" required>
        </div>

        <div class="form-group dato_ingreso">
            <label for="hora">Hora:</label>
            <input type="time" id="hora" name="hora" value="{{ valores['hora'] if valores else '' }}" required>
        </div>

        <div class="form-group dato_ingreso">
            <label for="cantidad_personas">Cantidad de personas:</label>
            <input type="number" id="cantidad_personas" name="cantidad_personas" min="1" max="30" placeholder="Ej: 4" value="{{ valores['cantidad_personas'] if valores else '' }}" required>
        </div>

        <div class="form-actions">
            <button type="submit" id="btn-confirmar-reserva" class="btn-submit">Confirmar Reserva</button>
            <a href="{{ url_for('reservas.reservasList') }}" class="btn-cancel">Cancelar</a>
        </div>

    </form>
</div>

<script src="{{ url_for('static', filename='js/crear_reserva.js') }}"></script>
{% endblock %}
