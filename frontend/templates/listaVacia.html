{% extends "layout.html" %}
{block title}{{ title }} {endblock title}

{% block content %}
<div class="form-container" style="text-align: center; max-width: 600px; margin: 50px auto; padding: 40px;">
    
    <div class="info-icon" style="font-size: 72px; margin-bottom: 20px; color: #17a2b8;">
        📅
    </div>

    <h1 style="font-size: 30px; margin-bottom: 10px; color: #333;">No hay reservas registradas</h1>
    
    <h2 style="font-size: 18px; color: #6c757d; font-weight: normal; margin-bottom: 30px;">
        Parece que la agenda de hoy todavía está libre.
    </h2>

    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 30px;">

    <p style="font-size: 16px; color: #495057; line-height: 1.6; margin-bottom: 30px;">
        No encontramos ninguna reserva activa en el sistema de la base de datos en este momento. 
    </p>

    <div style="margin-top: 20px;">
        <a href="{{ url_for('reservas.crearReserva') }}" class="btn-nueva-reserva" 
           style="display: inline-block; background-color: #007bff; color: white; padding: 12px 24px; border-radius: 5px; text-decoration: none; font-weight: bold; transition: background-color 0.2s;">
        </a>
    </div>

</div>

<style>
    .btn-nueva-reserva:hover {
        background-color: #0056b3 !important;
    }
</style>
{% endblock %}
