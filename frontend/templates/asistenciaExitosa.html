{% extends "layout.html" %}

{% block content %}
<div class="asistencia-container">
    <div class="asistencia-icono">✓</div>
    <h1 class="asistencia-titulo">¡Asistencia Confirmada!</h1>
    
    <p class="asistencia-texto">
        La reserva <strong>#{{ id_reserva }}</strong> ha sido marcada como 
        <span class="badge-completada">COMPLETADA</span> con éxito.
    </p>
    
    <p class="asistencia-ayuda">El cliente ya puede ingresar al salón y ocupar su mesa.</p>
</div>
{% endblock %}
