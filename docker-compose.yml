services:
  backend:
    build: ./backend
    container_name: app_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}

  frontend:
    build: ./frontend
    container_name: app_frontend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - backend